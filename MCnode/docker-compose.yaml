services:
  mc:
    image: itzg/minecraft-server:java25
    container_name: mc-server
    restart: unless-stopped
    ports:
      - "25565:25565"
      - "25575:25575"
    environment:
      EULA: "TRUE"
      TYPE: "CUSTOM"
      CUSTOM_SERVER: "/data/purpur.jar"
      MEMORY: "4G"
      ENABLE_RCON: "true"
      RCON_PORT: "25575"
      RCON_PASSWORD: "${RCON_PASSWORD}"
    volumes:
      - /opt/minecraft/data:/data
      - /opt/minecraft/plugins:/data/plugins
    tty: true
    stdin_open: true