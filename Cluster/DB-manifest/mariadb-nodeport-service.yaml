# 1. 외부 쓰기 접속용 (Primary Only)
apiVersion: v1
kind: Service
metadata:
  name: mariadb-external-write
  namespace: database
spec:
  type: NodePort
  ports:
    - port: 3306
      targetPort: 3306
      nodePort: 31306 # 외부에서 접속할 포트 (30000~32767 사이)
  selector:
    # StatefulSet의 0번 파드(Primary)에만 정확히 트래픽을 전달합니다.
    statefulset.kubernetes.io/pod-name: mariadb-0

---
# 2. 외부 읽기 접속용 (Read LoadBalancing)
apiVersion: v1
kind: Service
metadata:
  name: mariadb-external-read
  namespace: database
spec:
  type: NodePort
  ports:
    - port: 3306
      targetPort: 3306
      nodePort: 31307 # 외부에서 접속할 포트
  selector:
    statefulset.kubernetes.io/pod-name: mariadb-1