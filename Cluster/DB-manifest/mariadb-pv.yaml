# Pod별 정적 PV. StatefulSet의 volumeClaimTemplates가 자동 생성하는
# PVC(mariadb-data-mariadb-<ordinal>)와 claimRef로 1:1 사전 바인딩하여
# mariadb-0 -> k8s-worker-2, mariadb-1 -> k8s-worker-1 로 고정한다.
# 각 노드에 /data/mariadb 디렉토리가 미리 있어야 한다.
apiVersion: v1
kind: PersistentVolume
metadata:
  name: mariadb-pv-0
  labels:
    app: mariadb
spec:
  capacity:
    storage: 8Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: ""
  claimRef:
    namespace: database
    name: mariadb-data-mariadb-0
  hostPath:
    path: /data/mariadb
    type: DirectoryOrCreate
  nodeAffinity:
    required:
      nodeSelectorTerms:
        - matchExpressions:
            - key: kubernetes.io/hostname
              operator: In
              values:
                - k8s-worker-2

---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: mariadb-pv-1
  labels:
    app: mariadb
spec:
  capacity:
    storage: 8Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: ""
  claimRef:
    namespace: database
    name: mariadb-data-mariadb-1
  hostPath:
    path: /data/mariadb
    type: DirectoryOrCreate
  nodeAffinity:
    required:
      nodeSelectorTerms:
        - matchExpressions:
            - key: kubernetes.io/hostname
              operator: In
              values:
                - k8s-worker-1
