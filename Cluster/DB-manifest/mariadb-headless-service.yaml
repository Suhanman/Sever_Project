apiVersion: v1
kind: Service
metadata:
  name: mariadb-headless
  namespace: database
  labels:
    app: mariadb
spec:
  clusterIP: None       # Headless: DNS로 Pod IP 직접 반환
  ports:
    - port: 3306
      name: mysql
  selector:
    app: mariadb

---
# 읽기용 MySQL 인스턴스에 연결하기 위한 클라이언트 서비스.
# 쓰기용은 Primary인 mysql-0.mysql에 대신 연결해야 한다.
apiVersion: v1
kind: Service
metadata:
  name: mariadb-read
  namespace: database
  labels:
    app: mariadb
    readonly: "true"
spec:
  clusterIP: None
  ports:
    - name: mysql
      port: 3306
  selector:
    app:  mariadb