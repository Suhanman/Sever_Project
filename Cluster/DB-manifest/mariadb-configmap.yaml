apiVersion: v1
kind: ConfigMap
metadata:
  name: mariadb-config
  namespace: database
data:
  my.cnf: |
    [mysqld]
    character-set-server=utf8mb4
    collation-server=utf8mb4_unicode_ci
    max_connections=200
    innodb_buffer_pool_size=256M
    slow_query_log=1
    slow_query_log_file=/var/log/mysql/slow.log
    long_query_time=2

    [client]
    default-character-set=utf8mb4
