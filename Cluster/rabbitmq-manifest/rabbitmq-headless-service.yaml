# rabbitmq-headless-svc.yaml
apiVersion: v1
kind: Service
metadata:
  name: rabbitmq-headless
  namespace: rabbitmq
  labels:
    app: rabbitmq
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "15692"
    prometheus.io/path: "/metrics"
spec:
  clusterIP: None          # Headless 핵심 설정
  publishNotReadyAddresses: true   # 클러스터링 초기화 단계에서도 DNS 노출
  selector:
    app: rabbitmq
  ports:
    - name: amqp
      port: 5672
      protocol: TCP
    - name: manage
      port: 15672
      protocol: TCP
    - name: clustering
      port: 25672
      protocol: TCP
    - name: epmd
      port: 4369
      protocol: TCP
    - name: metrics
      port: 15692
      protocol: TCP