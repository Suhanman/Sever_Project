# rabbitmq-nodeport-svc.yaml
apiVersion: v1
kind: Service
metadata:
  name: rabbitmq-nodeport
  namespace: rabbitmq
  labels:
    app: rabbitmq
spec:
  type: NodePort
  selector:
    app: rabbitmq
  ports:
    - name: amqp
      port: 5672
      targetPort: 5672
      nodePort: 30672      # VPN 경유 AI 서버 연결용 (고정 포트)
    - name: management
      port: 15672
      targetPort: 15672
      nodePort: 31672
    - name: metrics
      port: 15692
      targetPort: 15692
      nodePort: 31673    # 관리 콘솔 + Terraform provider용